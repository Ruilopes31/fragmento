<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRAGMENTO | Anomalia Histórica</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <canvas id="matrix-canvas"></canvas>

    <div class="container">
        <header>
            <h1>SYS.FRAGMENTO</h1>
            <div class="streak">🔥 <span id="streak-count">0</span></div>
        </header>

        <main> <div class="document-header">
                <p class="status-line">STATUS: <span class="alert">ARQUIVO CORROMPIDO</span></p>
                <p>NÍVEL DE AMEAÇA: ALTO | ARQUIVO: #<span id="level-display">1</span></p>
            </div>
            
            <div id="mystery-text" class="terminal-box">
                Carregando dados do servidor confidencial...
            </div>

            <div class="interaction-area">
                <p id="attempts-display">TENTATIVAS RESTANTES: <span id="attempts-count">5</span></p>
                
                <div class="input-group">
                    <button id="sacrifice-btn" style="display: none; background-color: #ff3333; margin-bottom: 10px; width: 100%; font-size: 0.9em;">⚠️ SACRIFICAR 1 🔥 PARA REVELAR UMA LETRA</button>
                    
                    <div class="input-wrapper" style="display: flex; align-items: center; width: 100%;">
                        <span class="prompt-symbol" style="margin-right: 10px;">></span>
                        <input type="text" id="guess-input" placeholder="Identifique o alvo..." autocomplete="off" style="flex-grow: 1;">
                    </div>

                    <button id="submit-btn" style="width: 100%; margin-top: 10px;">EXECUTAR</button>
                    <button id="next-level-btn" style="display: none; background-color: #ffaa00; width: 100%; margin-top: 10px;">PRÓXIMO ARQUIVO</button>
                </div>
                
                <p id="feedback-message" style="margin-top: 15px; font-weight: bold;"></p>
                <button id="share-btn" style="display: none; background-color: #0088ff; margin-top: 15px; width: 100%;">📋 COMPARTILHAR RELATÓRIO</button>
            </div>
        </main> 
    </div>

    <script src="script.js"></script>
</body>
</html>
